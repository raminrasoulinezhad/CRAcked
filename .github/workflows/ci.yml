name: CI

# Formatting, lint, and tests on every push / PR. Mirrors the pre-commit checks
# so nothing that passes locally fails here (and vice versa).

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  rust:
    name: Rust (fmt, clippy, test)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Fetch bundled rclone sidecar
        run: ./scripts/fetch-rclone.sh x86_64-unknown-linux-gnu

      - name: rustfmt
        working-directory: src-tauri
        run: cargo fmt --check

      - name: clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings

      - name: test
        working-directory: src-tauri
        run: cargo test

  frontend:
    name: Frontend (prettier)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: prettier check
        run: npx --yes prettier@3 --check "src/**/*.{js,css,html}" "*.{json,md}" ".github/**/*.yml"
