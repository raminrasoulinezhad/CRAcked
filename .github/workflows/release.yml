name: Release

# Build a single self-contained installer per OS and attach them to a GitHub
# Release. Triggered by pushing a version tag (e.g. `v0.1.0`), or manually.
#
#   git tag v0.1.0 && git push origin v0.1.0
#
# Produces:
#   - Linux:   .deb and .AppImage
#   - Windows: .msi and NSIS .exe setup
#   - macOS:   .dmg (Apple Silicon + Intel)
# rclone is fetched per-OS and bundled into each installer (Tauri sidecar), so
# Google Drive backup works with zero extra setup for whoever installs it.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            triple: x86_64-unknown-linux-gnu
            args: ""
          - platform: windows-latest
            triple: x86_64-pc-windows-msvc
            args: ""
          - platform: macos-latest
            triple: aarch64-apple-darwin
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest
            triple: x86_64-apple-darwin
            args: "--target x86_64-apple-darwin"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.triple }}

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Fetch bundled rclone sidecar
        shell: bash
        run: ./scripts/fetch-rclone.sh ${{ matrix.triple }}

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "CRAcked ${{ github.ref_name }}"
          releaseBody: "Download the installer for your OS below. See BACKUP.md for the one-time Google Drive setup."
          releaseDraft: true
          prerelease: false
          projectPath: src-tauri
          args: ${{ matrix.args }}
